services:
  #  PostgreSQL 
  postgres:
    image: postgres:16-alpine
    container_name: km-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-kill_metraj}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-kill_metraj}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - km-network

  #  Redis 
  redis:
    image: redis:7-alpine
    container_name: km-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - km-network

  #  Backend API 
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: km-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    ports:
      - "${API_PORT:-5001}:5001"
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-kill_metraj}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      REDIS_ENABLED: "true"
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - km-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5001/health/readiness"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

  #  Frontend 
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""
    container_name: km-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - km-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  km-network:
    driver: bridge
